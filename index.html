<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Designer — Jewelry by Johan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* LIGHT THEME (default) */
  --bg:#f5f3ef;--bg2:#ffffff;--bg3:#eae7e1;--bg4:#ddd9d1;
  --gold:#7b6523;--gold-light:#b8922e;--gold-dim:#806a2a;
  --text:#1c1b19;--text-dim:#4a483f;--text-muted:#6b685c;
  --border:#d4d0c8;--border-light:#c2beb5;
  --danger:#c74b4b;--success:#3d7a50;
  --radius:6px;--radius-lg:10px;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --transition:0.25s cubic-bezier(.4,0,.2,1);
  --swatch-border:rgba(0,0,0,.12);
  --strip-text:rgba(255,255,255,.9);
  --strip-text-dim:rgba(255,255,255,.65);
  --strip-hover:rgba(0,0,0,.15);
  --overlay:rgba(0,0,0,.35);
  --ring-highlight:rgba(255,255,255,0.35);
  --ring-shadow:rgba(0,0,0,0.18);
  --ring-edge-top:rgba(255,255,255,0.25);
  --ring-edge-bot:rgba(0,0,0,0.25);
  --ring-edge-side:rgba(0,0,0,0.1);
  --ring-strip-stroke:rgba(0,0,0,0.15);
  --done-dot-text:#fff;
  --val-error-bg:rgba(199,75,75,.08);--val-error-border:rgba(199,75,75,.25);--val-error-text:#b63c3c;
  --val-warn-bg:rgba(123,101,35,.08);--val-warn-border:rgba(123,101,35,.25);--val-warn-text:#7b6523;
  --val-info-bg:rgba(61,122,80,.08);--val-info-border:rgba(61,122,80,.25);--val-info-text:#3d7a50;
  --input-bg:#f0ede8;
  --btn-next-text:#fff;
}
[data-theme="dark"]{
  --bg:#111110;--bg2:#1a1a18;--bg3:#242422;--bg4:#2e2e2b;
  --gold:#c9a84c;--gold-light:#e0c96a;--gold-dim:#8a7434;
  --text:#e8e4da;--text-dim:#9e9a8e;--text-muted:#908d80;
  --border:#333330;--border-light:#444440;
  --danger:#c74b4b;--success:#5a9e6f;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --swatch-border:rgba(255,255,255,.1);
  --strip-text:rgba(255,255,255,.8);
  --strip-text-dim:rgba(255,255,255,.6);
  --strip-hover:rgba(255,255,255,.2);
  --overlay:rgba(0,0,0,.7);
  --ring-highlight:rgba(255,255,255,0.15);
  --ring-shadow:rgba(0,0,0,0.35);
  --ring-edge-top:rgba(255,255,255,0.15);
  --ring-edge-bot:rgba(0,0,0,0.4);
  --ring-edge-side:rgba(0,0,0,0.2);
  --ring-strip-stroke:rgba(0,0,0,0.3);
  --done-dot-text:#fff;
  --val-error-bg:rgba(199,75,75,.1);--val-error-border:rgba(199,75,75,.3);--val-error-text:#e87777;
  --val-warn-bg:rgba(201,168,76,.08);--val-warn-border:rgba(201,168,76,.2);--val-warn-text:#e0c96a;
  --val-info-bg:rgba(90,158,111,.08);--val-info-border:rgba(90,158,111,.2);--val-info-text:#7ec494;
  --input-bg:#242422;
  --btn-next-text:#111110;
}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s ease,color .3s ease}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;color:inherit}

/* ── LAYOUT ── */
.app{max-width:1280px;margin:0 auto;padding:0 20px}
.app-header{text-align:center;padding:28px 0 20px;border-bottom:1px solid var(--border);position:relative}
.app-header h1{font-family:var(--font-display);font-weight:300;font-size:1.8rem;letter-spacing:.08em;color:var(--gold)}
.app-header .tagline{font-size:.75rem;color:var(--text-muted);letter-spacing:.15em;text-transform:uppercase;margin-top:4px}

/* Steps indicator */
.steps-bar{display:flex;align-items:center;justify-content:center;gap:0;padding:20px 0 16px;overflow-x:auto}
.step-dot{display:flex;align-items:center;gap:0}
.step-dot .dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:var(--text-muted);transition:var(--transition);cursor:pointer;flex-shrink:0}
.step-dot .dot:hover{border-color:var(--text-muted)}
.step-dot .dot.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1)}
.step-dot .dot.done{border-color:var(--gold-dim);color:var(--done-dot-text);background:var(--gold-dim)}
.step-dot .line{width:32px;height:1px;background:var(--border);flex-shrink:0}
.step-dot .line.done{background:var(--gold-dim)}
.step-label{display:none;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-top:4px}
.step-dot .dot.active + .step-label{display:block;color:var(--gold)}
.step-dot .tip{display:none;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:.7rem;color:var(--text-dim);white-space:nowrap;max-width:220px;white-space:normal;text-align:center;line-height:1.4;box-shadow:var(--shadow);z-index:10;pointer-events:none}
.step-dot .tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--border)}
.step-dot:hover .tip{display:block}

/* Main layout: preview + controls */
.main-layout{display:grid;grid-template-columns:1fr 1fr;gap:32px;padding:24px 0 100px}
.preview-col{position:sticky;top:20px;align-self:start}
.controls-col{min-height:400px}
#abovePreview:empty{display:none}
#abovePreview{padding:0 0 100px}

/* Ring Preview */
.ring-preview-wrap{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;text-align:center}
.ring-preview-wrap h3{font-family:var(--font-display);font-weight:400;font-size:1rem;color:var(--text-dim);margin-bottom:16px;letter-spacing:.05em}
.ring-svg-container{display:flex;justify-content:center;align-items:center;min-height:240px}
.ring-svg-container svg,.ring-svg-container canvas{max-width:100%}
.ring-specs{display:flex;justify-content:center;gap:20px;margin-top:16px;font-size:.72rem;color:var(--text-muted)}
.ring-specs span{display:flex;align-items:center;gap:4px}
.ring-specs .val{color:var(--text);font-weight:500}
.ring-reset-wrap{margin-top:10px;text-align:center}
.ring-reset-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg3);color:var(--text-dim);border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;font-size:.68rem;font-family:var(--font-body);cursor:pointer;transition:all .2s;letter-spacing:.02em}
.ring-reset-btn:hover{background:var(--bg2);color:var(--text);border-color:var(--gold)}
.canvas-undo-btn{position:absolute;top:8px;left:8px;z-index:10;background:var(--bg3);color:var(--text-dim);border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;cursor:pointer;transition:all .2s;display:none;align-items:center;gap:4px;font-size:.68rem;font-family:var(--font-body);letter-spacing:.02em}
.canvas-undo-btn:hover{background:var(--bg2);color:var(--text);border-color:var(--gold)}
.canvas-undo-btn svg{width:14px;height:14px}
.btn-undo{display:inline-flex;align-items:center;gap:4px}
.btn-undo svg{width:14px;height:14px}
.ring-reset-hint{font-size:.6rem;color:var(--text-muted);margin-top:4px}
#iconSun{display:none}
#ringResetWrap{display:none}
#profileDisplay{text-align:center;margin-top:12px;display:none}
.profile-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:6px}
#profileImg{max-width:180px;height:auto;border-radius:var(--radius);border:1px solid var(--border);padding:6px;background:var(--bg3)}
#profileName{font-size:.72rem;color:var(--text-dim);margin-top:4px;font-weight:500}

/* Price display */
.price-bar{display:none}
.price-bar .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted)}
.price-bar .amount{font-family:var(--font-display);font-size:1.6rem;font-weight:400;color:var(--gold)}
.price-bar .note{font-size:.65rem;color:var(--text-muted);margin-top:2px}

/* Strip legend under preview */
.strip-legend{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.strip-legend-item{display:flex;align-items:center;gap:4px;font-size:.65rem;color:var(--text-dim)}
.strip-legend-item .swatch{width:10px;height:10px;border-radius:2px;border:1px solid var(--swatch-border)}

/* ── PANELS ── */
.panel{display:none}
.panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.panel-title{font-family:var(--font-display);font-weight:400;font-size:1.3rem;color:var(--text);margin-bottom:4px}
.panel-desc{font-size:.78rem;color:var(--text-muted);margin-bottom:20px;line-height:1.5}

/* Material grid */
.mat-groups{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.mat-group-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);font-size:.7rem;color:var(--text-dim);transition:var(--transition);white-space:nowrap}
.mat-group-btn:hover{border-color:var(--text-muted);color:var(--text)}
.mat-group-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}

.mat-search{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;color:var(--text);margin-bottom:14px;outline:none;transition:var(--transition)}
.mat-search:focus{border-color:var(--gold-dim)}
.mat-search::placeholder{color:var(--text-muted)}

.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;max-height:380px;overflow-y:auto;padding-right:4px}
.mat-grid::-webkit-scrollbar{width:4px}
.mat-grid::-webkit-scrollbar-track{background:var(--bg2)}
.mat-grid::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}

.mat-card{padding:10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:8px}
.mat-card:hover{border-color:var(--text-muted);background:var(--bg3)}
.mat-card.selected{border-color:var(--gold);background:rgba(201,168,76,.06)}
.mat-card.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.mat-card .swatch{width:20px;height:20px;border-radius:3px;flex-shrink:0;border:1px solid var(--swatch-border)}
.mat-card .name{font-size:.72rem;line-height:1.3;color:var(--text-dim)}
.mat-card.selected .name{color:var(--gold)}

/* Width & Profile selectors */
.width-control{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.width-control input[type=range]{flex:1;accent-color:var(--gold);height:4px}
.width-val{font-family:var(--font-display);font-size:1.4rem;color:var(--gold);min-width:60px;text-align:center}

.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.profile-card{padding:12px 10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:center;font-size:.72rem;color:var(--text-dim);transition:var(--transition)}
.profile-card:hover{border-color:var(--text-muted)}
.profile-card.selected{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06)}
.profile-card.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.profile-card svg{display:block;margin:0 auto 6px;opacity:.7}
.profile-card.selected svg{opacity:1}

/* Strip Composer */
.composer{margin-top:8px}
.composer-strips{display:flex;gap:2px;min-height:60px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;align-items:stretch;flex-wrap:nowrap}
.strip-block{position:relative;min-width:28px;padding:4px 2px;border-radius:3px;text-align:center;cursor:pointer;transition:var(--transition);display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid transparent}
.strip-block:hover{border-color:var(--strip-hover)}
.strip-block.selected{border-color:var(--gold)}
.strip-block .s-name{font-size:.5rem;color:var(--strip-text);writing-mode:vertical-rl;text-orientation:mixed;line-height:1;max-height:50px;overflow:hidden}
.strip-block .s-width{font-size:.55rem;color:var(--strip-text-dim);margin-top:2px}
.strip-block .s-remove{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--danger);color:#fff;font-size:.6rem;display:none;align-items:center;justify-content:center;line-height:1}
.strip-block:hover .s-remove{display:flex}
.strip-block[draggable=true]{cursor:grab}
.strip-block[draggable=true]:active{cursor:grabbing}
.strip-block.dragging{opacity:.3;transform:scale(.95)}
.strip-block.drag-over-left{box-shadow:inset 3px 0 0 var(--gold)}
.strip-block.drag-over-right{box-shadow:inset -3px 0 0 var(--gold)}
.composer-strips.drag-active{background:var(--bg4)}

/* Strip move arrows */
.strip-arrows{display:flex;justify-content:center;gap:4px;margin-top:6px;margin-bottom:4px}
.strip-arrow{width:32px;height:28px;border-radius:var(--radius);border:1px solid var(--gold);color:var(--gold);background:rgba(201,168,76,.08);display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;transition:var(--transition);line-height:1}
.strip-arrow:hover{background:rgba(201,168,76,.18)}
.strip-arrow:active{transform:scale(.92)}
.strip-edit-btn{padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border);color:var(--text-dim);font-size:.6rem;cursor:pointer;background:var(--bg2);transition:var(--transition)}
.strip-edit-btn:hover{border-color:var(--gold);color:var(--gold)}
.strip-block.active-selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}

.remaining-width{font-size:.75rem;color:var(--text-muted);margin-bottom:10px}
.remaining-width .val{color:var(--gold);font-weight:500}

.composer-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.btn{padding:8px 16px;border-radius:var(--radius);font-size:.78rem;font-weight:500;transition:var(--transition)}
.btn-gold{background:var(--gold);color:var(--bg);border:1px solid var(--gold)}
.btn-gold:hover{background:var(--gold-light)}
.btn-outline{border:1px solid var(--border);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--text-muted);color:var(--text)}
.btn-sm{padding:6px 10px;font-size:.7rem}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Templates */
.templates{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.template-btn{padding:6px 12px;border-radius:20px;border:1px dashed var(--border);font-size:.68rem;color:var(--text-muted);transition:var(--transition)}
.template-btn:hover{border-color:var(--gold-dim);color:var(--gold-dim)}

/* Add strip modal */
.modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal h3{font-family:var(--font-display);font-weight:400;font-size:1.1rem;margin-bottom:16px}
.modal-close{position:absolute;top:12px;right:16px;font-size:1.2rem;color:var(--text-muted)}

/* Width picker in modal */
.width-picker{display:flex;align-items:center;gap:12px;margin:12px 0}
.width-picker input[type=number]{width:70px;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);text-align:center;font-size:.9rem}
.width-picker label{font-size:.78rem;color:var(--text-dim)}

/* Finish grid */
.finish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.finish-card{padding:12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:.75rem;color:var(--text-dim);transition:var(--transition);text-align:center}
.finish-card:hover{border-color:var(--text-muted)}
.finish-card.selected{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06)}
.finish-card.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

/* Size selector */
.size-grid{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.size-btn{width:44px;height:36px;border:1px solid var(--border);border-radius:var(--radius);font-size:.72rem;color:var(--text-dim);display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.size-btn:hover{border-color:var(--text-muted)}
.size-btn.selected{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.size-btn.quarter{font-size:.64rem;opacity:.75}
.size-btn.quarter.selected{opacity:1}

/* Help links */
.help-link:hover{border-color:var(--gold-dim)!important}

/* Summary */
.summary-section{margin-bottom:20px}
.summary-section h4{font-family:var(--font-display);font-weight:400;font-size:1rem;color:var(--text-dim);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.78rem}
.summary-row .label{color:var(--text-muted)}
.summary-row .value{color:var(--text);font-weight:500}
.summary-row .price{color:var(--gold)}

.summary-total{display:flex;justify-content:space-between;padding:14px 0;border-top:2px solid var(--gold-dim);margin-top:8px;font-size:1rem}
.summary-total .label{font-weight:500}
.summary-total .price{font-family:var(--font-display);font-size:1.4rem;color:var(--gold);font-weight:500}

/* Email form */
.email-form{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-top:16px}
.email-form h4{font-family:var(--font-display);font-weight:400;font-size:1rem;margin-bottom:12px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:.72rem;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.form-row input,.form-row textarea{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;outline:none;transition:var(--transition)}
.form-row input:focus,.form-row textarea:focus{border-color:var(--gold-dim)}
.form-row textarea{resize:vertical;min-height:60px}

/* Engraving */
.engraving-input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;color:var(--text);margin-bottom:8px;outline:none}
.engraving-input:focus{border-color:var(--gold-dim)}
.engraving-preview{font-family:var(--font-display);font-size:1.1rem;color:var(--gold);text-align:center;padding:12px;background:var(--bg2);border-radius:var(--radius);letter-spacing:.08em;min-height:40px;margin-bottom:12px;font-style:italic}

/* Nav buttons */
.nav-buttons{display:flex;justify-content:space-between;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.btn-nav{padding:10px 24px;border-radius:var(--radius);font-size:.82rem;font-weight:500}
.btn-prev{border:1px solid var(--border);color:var(--text-dim)}
.btn-prev:hover{border-color:var(--text-muted);color:var(--text)}
.btn-next{background:var(--gold);color:var(--btn-next-text)}
.btn-next:hover{background:var(--gold-light)}
.btn-next:disabled{opacity:.4;cursor:not-allowed}

/* Validation messages */
.validation-msg{padding:8px 12px;border-radius:var(--radius);font-size:.72rem;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.validation-msg.error{background:var(--val-error-bg);border:1px solid var(--val-error-border);color:var(--val-error-text)}
.validation-msg.warn{background:var(--val-warn-bg);border:1px solid var(--val-warn-border);color:var(--val-warn-text)}
.validation-msg.info{background:var(--val-info-bg);border:1px solid var(--val-info-border);color:var(--val-info-text)}

/* ── MOBILE ── */
@media(max-width:840px){
  .main-layout{grid-template-columns:1fr;gap:12px}
  .preview-col{position:relative;top:0}
  .mat-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));max-height:260px}
  .step-dot .line{width:16px}
  .app-header h1{font-size:1.4rem}
  .profile-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
  .finish-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
  
  /* Compact preview on tablet */
  .ring-svg-container{min-height:180px}
  .ring-preview-wrap{padding:16px}

  .width-control{flex-wrap:wrap;gap:10px}
  .width-control input[type=range]{flex:1 1 100%;order:2}
  .width-control span:first-child{order:1}
  .width-control span:nth-child(3){order:3}
  
  /* Nav buttons full width */

  .btn-nav{flex:1;text-align:center}
  
  /* Modal — full screen on mobile */

  .modal{max-width:100%;max-height:92vh;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
  .modal h3{font-size:1rem}
  .modal .mat-grid{max-height:35vh}
  .modal .width-picker input[type=number]{width:80px;padding:12px;font-size:1rem;min-height:44px}
  
  /* Engraving input */

  /* Email form */
  .email-form{padding:16px}
  .form-row input,.form-row textarea{padding:12px;font-size:.85rem;min-height:44px}

  .summary-total .price{font-size:1.2rem}
}

/* Sticky mobile price bar */
.price-bar-mobile{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:10px 20px;padding-bottom:max(10px,env(safe-area-inset-bottom));justify-content:center;align-items:center;gap:16px;z-index:50;box-shadow:0 -2px 12px rgba(0,0,0,.15)}

/* Scrollbar */

<script>
// ═══════════════════════════════════════════════════
// JBJ RING DESIGNER — Phase 1
// ═══════════════════════════════════════════════════

// ── THEME TOGGLE ──
(function initTheme(){
  const saved = localStorage.getItem('jbj-theme');
  if(saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
  // Light is default (no attribute needed)
  updateToggleIcons();
})();
function toggleTheme(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if(isDark){
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('jbj-theme','light');
  } else {
    document.documentElement.setAttribute('data-theme','dark');
    localStorage.setItem('jbj-theme','dark');
  }
  updateToggleIcons();
  // Re-render ring to pick up new theme colors
  if(typeof renderRing === 'function') renderRing();
}
function updateToggleIcons(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const sun = document.getElementById('iconSun');
  const moon = document.getElementById('iconMoon');
  if(sun) sun.style.display = isDark ? 'block' : 'none';
  if(moon) moon.style.display = isDark ? 'none' : 'block';
}
document.addEventListener('DOMContentLoaded',()=>{
  const btn = document.getElementById('themeToggle');
  if(btn) btn.addEventListener('click', toggleTheme);
});

// ── DATA (loaded below) ──
let DATA = null;

// ── CONSTANTS ──
const STEPS = [
  {id:'size', label:'Ring Size', num:1, tip:'Choose your ring size — if unsure, order a ring sizer or visit a local jeweler'},
  {id:'metal', label:'Base Metal', num:2, tip:'Pick the main metal for your ring — this forms the structure and edges'},
  {id:'width', label:'Width & Profile', num:3, tip:'Set how wide your ring is and choose its cross-section shape'},
  {id:'compose', label:'Band Composer', num:4, tip:'Add inlay materials like wood, stone, or meteorite between the metal edges'},
  {id:'sleeve', label:'Sleeve', num:5, tip:'Choose the inner liner material — what touches your finger'},
  {id:'finish', label:'Finish', num:6, tip:'Select a surface texture — polished, brushed, matte, and more'},
  {id:'summary', label:'Summary', num:7, tip:'Review your custom ring design and get your estimated price'}
];

const METAL_GROUPS = ['Metals','Metals Precious'];
const SLEEVE_MATERIALS = ['Titanium','Tungsten','Zirconium','Black Ceramic','Damascus','Stainless','Platinum',
  'Yellow 10K','Yellow 14K','Yellow 18K','White 10K','White 14K','White 18K','Rose 14K','Rose 18K','Silver'];

const PROFILES = [
  'Flat','Round','Tension','Bevel','Beveled','Dome','Half Dome','Half Round','Knife Edge',
  'Pipe Cut','Square','Signet','Cathedral','Comfort Fit','Euro Shank','Barrel','Wavy',
  'Concave','Convex','Milgrain','Stepped','Grooved','Custom','D-Shape'
];

const FINISHES = ['Polished','Brushed','Matte','Sandblasted','Deep Frost','Frost','Hammer'];

const INLAY_PROFILES = ['Flat','Round'];

const RING_SIZES = [];
for(let s=4; s<=14; s+=0.25) RING_SIZES.push(s);

const WIDTHS = [];
for(let w=2; w<=14; w+=1) WIDTHS.push(w);

// ── STATE ──
const state = {
  step: 0,
  baseMetal: null,
  ringWidth: 8,
  profile: 'Flat',
  wantsInlays: null, // null=not yet chosen, true/false after Step 3
  strips: [],
  selectedStrip: -1,
  sleeve: null,
  finish: 'Polished',
  ringSize: null,
  engraving: '',
  email: '',
  spotPrices: {Gold:4640, Platinum:1980, Silver:72}, // defaults updated April 2026, live prices fetched on load
  spotsLoaded: false
};

// ── 3D RING VIEW STATE ──
const ringView = {
  elevation: 0,    // degrees, camera tilt (0=straight-on, up to 65)
  azimuth: 90,     // degrees, rotation around ring (90=band face toward camera)
  isDragging: false,
  lastX: 0,
  lastY: 0,
  canvas: null
};

// ── HELPERS ──
function $(sel,ctx=document){return ctx.querySelector(sel)}
function $$(sel,ctx=document){return [...ctx.querySelectorAll(sel)]}
function h(tag,attrs={},children=[]){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='class')el.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(typeof v==='boolean'){if(v)el.setAttribute(k,'');} 
    else el.setAttribute(k,v);
  }
  for(const c of(Array.isArray(children)?children:[children])){
    if(typeof c==='string')el.appendChild(document.createTextNode(c));
    else if(c)el.appendChild(c);
  }
  return el;
}

function getColor(name){
  if(!DATA)return '#666';
  // Direct match
  if(DATA.c[name])return DATA.c[name];
  // Check group defaults
  const mat=DATA.m[name];
  if(!mat)return '#666';
  const g=mat.g;
  if(['Metals','Metals Precious'].includes(g))return DATA.c._default_metal||'#C0C0C0';
  if(g==='Woods')return DATA.c._default_wood||'#8B5A2B';
  if(g==='Lapidary')return DATA.c._default_lapidary||'#708090';
  return DATA.c._default_organic||'#D2B48C';
}

function isLightColor(hex){
  const c=hex.replace('#','');
  const r=parseInt(c.substring(0,2),16)/255;
  const g=parseInt(c.substring(2,4),16)/255;
  const b=parseInt(c.substring(4,6),16)/255;
  const toL=v=>v<=0.04045?v/12.92:Math.pow((v+0.055)/1.055,2.4);
  return 0.2126*toL(r)+0.7152*toL(g)+0.0722*toL(b)>0.4;
}

function isMetal(name){
  return name===state.baseMetal;
}

function isMetalGroup(name){
  if(!DATA||!DATA.m[name])return false;
  return['Metals','Metals Precious'].includes(DATA.m[name].g);
}

function isPrecious(name){
  if(!DATA||!DATA.m[name])return false;
  return DATA.m[name].g==='Metals Precious'||name==='Platinum';
}

function getMinWidth(materialName, usage='solid_inlay'){
  if(!DATA||!DATA.m[materialName])return 0.5;
  const mins=DATA.m[materialName].mi;
  return mins[usage]||0.25;
}

function getMaterialsByGroup(group){
  if(!DATA)return[];
  return Object.entries(DATA.m)
    .filter(([n,m])=>m.g===group)
    .map(([n])=>n)
    .sort();
}

function getAllGroups(){
  if(!DATA)return[];
  const groups=new Set();
  Object.values(DATA.m).forEach(m=>groups.add(m.g));
  return[...groups].sort();
}

// ── PRICING ENGINE ──
// TODO: Server-verified price hash — on quote submission, generate an HMAC hash of all prices
// (spot prices, inlay prices, total) server-side via Cloudflare Worker, and include it in the
// submitted quote. When reviewing quotes, verify the hash to detect any client-side price tampering.
function calcPrice(){
  if(!DATA||!state.baseMetal||!state.ringSize)return null;
  let total=0;
  const breakdown=[];

  const bm=state.baseMetal;
  const slv=state.sleeve||bm;
  const hasInlays=state.strips.some(s=>!isMetal(s.material));
  
  // 1. Base metal cost (always included, as if sleeve = base metal)
  if(isPrecious(bm)){
    const pCost=calcPreciousMetalCost(bm, state.ringWidth, state.ringSize, hasInlays);
    total+=pCost;
    breakdown.push({label:`${bm} (Base Metal)`, price:pCost});
  } else if(DATA.p[bm] && DATA.p[bm].per_mm_base){
    // Per-mm pricing (e.g. Metal Mokume)
    const cost=DATA.p[bm].per_mm_base*state.ringWidth;
    total+=cost;
    breakdown.push({label:`${bm} (Base Metal, ${state.ringWidth}mm)`, price:cost});
  } else {
    const pData=DATA.p[bm];
    if(pData){
      let cost=0;
      if(hasInlays && pData.sleeve_with_inlay) cost=pData.sleeve_with_inlay;
      else if(pData.sleeve) cost=pData.sleeve;
      else if(pData.full_ring) cost=pData.full_ring;
      else if(pData.fixed_price) cost=pData.fixed_price;
      total+=cost;
      breakdown.push({label:`${bm} (Base Metal)`, price:cost});
    }
  }
  
  // 2. Sleeve adder (only when sleeve is different from base metal)
  if(slv!==bm){
    if(isPrecious(slv)){
      const sCost=calcPreciousMetalCost(slv, state.ringWidth, state.ringSize, hasInlays);
      total+=sCost;
      breakdown.push({label:`${slv} (Sleeve)`, price:sCost});
    } else if(DATA.p[slv] && DATA.p[slv].per_mm_sleeve){
      const cost=DATA.p[slv].per_mm_sleeve*state.ringWidth;
      total+=cost;
      breakdown.push({label:`${slv} (Sleeve, ${state.ringWidth}mm)`, price:cost});
    } else {
      const sData=DATA.p[slv];
      if(sData){
        let cost=0;
        if(hasInlays && sData.sleeve_with_inlay) cost=sData.sleeve_with_inlay;
        else if(sData.sleeve) cost=sData.sleeve;
        else if(sData.fixed_price) cost=sData.fixed_price;
        total+=cost;
        breakdown.push({label:`${slv} (Sleeve)`, price:cost});
      }
    }
  }

  // 3. Strip costs (inlays and pinstripes)
  for(const strip of state.strips){
    if(isMetal(strip.material)){
      // Base metal strip (edge/pinstripe) — included in base metal cost
      // Skip charging unless it's a different metal from both base and sleeve
      if(strip.material!==bm && strip.material!==slv){
        if(isPrecious(strip.material)){
          const psCost=calcPinstripePrice(strip.material, strip.width, state.ringSize, 1, false);
          total+=psCost;
          breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:psCost});
        } else {
          const pd=DATA.p[strip.material];
          if(pd && pd.partials){
            total+=pd.partials;
            breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:pd.partials});
          }
        }
      }
    } else if(isMetalGroup(strip.material)){
      // Non-base metal used as inlay
      if(isPrecious(strip.material)){
        const psCost=calcPinstripePrice(strip.material, strip.width, state.ringSize, 1, true);
        total+=psCost;
        breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:psCost});
      } else if(DATA.p[strip.material] && DATA.p[strip.material].per_mm_inlay){
        // Per-mm inlay pricing (e.g. Metal Mokume)
        const cost=DATA.p[strip.material].per_mm_inlay*strip.width;
        total+=cost;
        breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:cost});
      } else {
        const pd=DATA.p[strip.material];
        if(pd && pd.partials){
          total+=pd.partials;
          breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:pd.partials});
        }
      }
    } else {
      // Non-metal inlay material (wood, stone, meteorite, etc.)
      const cost=getInlayPrice(strip.material, strip.width);
      total+=cost;
      breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:cost});
    }
  }

  return{total, breakdown};
}

function calcPreciousMetalCost(metalName, ringWidthMm, ringSize, hasInlays){
  const f=DATA.f;
  const dia=ringSize*0.8128+11.63;
  const circ=Math.PI*dia;
  const thickness=f.ring_thickness_mm;
  const inlayDepth=f.inlay_depth_mm;
  
  // Total volume
  const totalVol=(circ/10)*(ringWidthMm/10)*(thickness/10);
  
  // Inlay volume (rough estimate based on strips)
  let inlayWidthTotal=0;
  if(hasInlays){
    for(const s of state.strips){
      if(!isMetal(s.material)) inlayWidthTotal+=s.width;
    }
  }
  const inlayVol=(circ/10)*(inlayWidthTotal/10)*(inlayDepth/10);
  const metalVol=totalVol-inlayVol;
  
  // Density
  let density=13.07; // gold default
  if(metalName.includes('Platinum')) density=21.45;
  else if(metalName.includes('Silver')) density=10.49;
  
  const metalWeight=metalVol*density;
  const weightScrap=metalWeight*1.05;
  
  // Spot price
  let spotPerOz=state.spotPrices.Gold;
  let karatFactor=1;
  if(metalName.includes('Platinum')){spotPerOz=state.spotPrices.Platinum;karatFactor=1;}
  else if(metalName.includes('Silver')){spotPerOz=state.spotPrices.Silver;karatFactor=1;}
  else if(metalName.includes('10K')) karatFactor=0.4167;
  else if(metalName.includes('14K')) karatFactor=0.5833;
  else if(metalName.includes('18K')) karatFactor=0.75;
  
  const pricePerGram=(spotPerOz/31.1034768)*karatFactor;
  const alloyCost=pricePerGram*weightScrap;
  
  const isCrushed=false; // simplified
  const printing=isCrushed?60:120;
  const castLabor=isCrushed?10:20;
  const desprue=20;
  
  return(alloyCost+printing+castLabor)*2+desprue;
}

function calcPinstripePrice(metalName, widthMm, ringSize, qty, isInlay){
  // Pinstripes use outer-surface diameter; inlays use ring inner diameter
  const dia=isInlay?(ringSize*0.8128+11.63):(22.1964+2.54*0.1016*(ringSize-13));
  const circ=Math.PI*dia;
  const depth=DATA.f.pinstripe_depth_mm||1.75;
  const vol=(widthMm*depth*circ*qty)/1000;
  let density=13.07;
  if(metalName.includes('Platinum')) density=21.45;
  else if(metalName.includes('Silver')) density=10.49;
  const weight=vol*density;
  const weightScrap=weight*1.05;
  
  let spotPerOz=state.spotPrices.Gold;
  let karatFactor=1;
  if(metalName.includes('Platinum')){spotPerOz=state.spotPrices.Platinum;karatFactor=1;}
  else if(metalName.includes('Silver')){spotPerOz=state.spotPrices.Silver;karatFactor=1;}
  else if(metalName.includes('10K')) karatFactor=0.4167;
  else if(metalName.includes('14K')) karatFactor=0.5833;
  else if(metalName.includes('18K')) karatFactor=0.75;
  
  const pricePerGram=(spotPerOz/31.1034768)*karatFactor;
  const matCost=pricePerGram*weightScrap;
  return(matCost+50)*2;
}

function getInlayPrice(materialName, widthMm){
  // Check width-based pricing first
  if(DATA.pm[materialName]){
    const prices=DATA.pm[materialName];
    let closest=prices[0];
    for(const[mm,price]of prices){
      if(mm<=widthMm) closest=[mm,price];
      else break;
    }
    return closest[1]||0;
  }
  
  // Check meteorite pricing
  if(materialName.includes('Meteorite')||materialName.includes('Gibeon')){
    const mp=DATA.mp.filter(r=>r.m===materialName);
    if(mp.length){
      let closest=mp[0];
      for(const r of mp){
        if(r.w<=widthMm) closest=r;
        else break;
      }
      return closest.mm||closest.pt||0;
    }
  }
  
  // Check mokume pricing
  if(materialName==='Metal Mokume'&&DATA.p[materialName]&&DATA.p[materialName].per_mm_inlay){
    return DATA.p[materialName].per_mm_inlay*widthMm;
  }
  if(materialName.includes('Mokume')&&!materialName.includes('Metal')){
    let closest=DATA.mk[0];
    for(const[mm,price]of DATA.mk){
      if(mm<=widthMm) closest=[mm,price];
      else break;
    }
    return closest[1]||0;
  }
  
  // Fixed pricing
  if(DATA.p[materialName]){
    return DATA.p[materialName].fixed_price||0;
  }
  
  return 0;
}

// ── 3D RING RENDERER (Canvas) ──
function getThemeVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// 3D rotation helper
function rot3D(x,y,z,eRad,aRad){
  const ce=Math.cos(eRad),se=Math.sin(eRad);
  const ca=Math.cos(aRad),sa=Math.sin(aRad);
  const y1=y*ce-z*se, z1=y*se+z*ce;
  return{x:x*ca+z1*sa, y:y1, z:-x*sa+z1*ca};
}

// Adjust hex color brightness
function adjBright(hex,b){
  if(!hex||hex.charAt(0)!=='#')return hex||'#888';
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, bl=n&255;
  r=Math.min(255,Math.max(0,Math.round(r*b)));
  g=Math.min(255,Math.max(0,Math.round(g*b)));
  bl=Math.min(255,Math.max(0,Math.round(bl*b)));
  return`rgb(${r},${g},${bl})`;
}

// Build strip layout as fractional positions
function buildStripLayout(){
  const layout=[];
  const tw=state.ringWidth;
  if(!tw)return[{s:0,e:1,color:getColor(state.baseMetal)||'#888',mat:state.baseMetal}];
  if(state.strips.length===0){
    return[{s:0,e:1,color:getColor(state.baseMetal)||'#888',mat:state.baseMetal}];
  }
  let used=0;
  for(const st of state.strips){
    layout.push({s:used/tw,e:(used+st.width)/tw,color:getColor(st.material),mat:st.material});
    used+=st.width;
  }
  if(used<tw-0.01){
    layout.push({s:used/tw,e:1,color:getColor(state.baseMetal)||'#888',mat:state.baseMetal});
  }
  return layout;
}

// Profile shape: outer surface offset at normalized position t (0=first edge, 1=last edge)
function profOuterOff(profile,t,thick){
  const u=t*2-1; // -1 to 1
  const u2=u*u;
  switch(profile){
    case 'Round':case 'Dome':case 'D-Shape':case 'Half Round':
      return(1-u2)*thick*0.5;
    case 'Half Dome':
      return(1-u2)*thick*0.3;
    case 'Comfort Fit':
      return(1-u2)*thick*0.18;
    case 'Bevel':case 'Beveled':{
      const a=Math.abs(u);
      return a>0.6?-(a-0.6)/0.4*thick*0.4:0;
    }
    case 'Knife':case 'Knife Edge':
      return(1-Math.abs(u))*thick*0.6;
    case 'Tension':
      return(1-u2)*thick*0.22;
    case 'Concave':case 'Concave Center':
      return-(1-u2)*thick*0.35;
    case 'Convex':
      return(1-u2)*thick*0.4;
    case 'Euro Shank':
      return(1-u2)*thick*0.35;
    case 'Angular':
      return(1-Math.abs(u))*thick*0.35;
    case 'Wavy':
      return Math.sin(u*Math.PI*2)*thick*0.18;
    case 'Mobius':
      return Math.sin(u*Math.PI)*thick*0.3;
    case 'Concave Edge':{
      const a=Math.abs(u);
      return a>0.5?-(a-0.5)/0.5*thick*0.3:0;
    }
    case 'Domed Edge Large':case 'Domed Edge Small':{
      const a=Math.abs(u);
      const sz=profile.includes('Large')?0.4:0.25;
      return a>0.55?(1-((a-0.55)/0.45))*thick*sz:thick*sz;
    }
    case 'Flat Edge Dome High':
      return(1-u2)*thick*0.38;
    case 'Flat Edge Dome Low':
      return(1-u2)*thick*0.2;
    case 'Radius Edge Dome':
      return(1-u2)*thick*0.32;
    case 'Radius Edge Flat':{
      const a=Math.abs(u);
      return a>0.7?-(a-0.7)/0.3*thick*0.2:0;
    }
    case 'Grooved Edge Dome':case 'Grooved Edge Knife':{
      const base=profile.includes('Knife')?(1-Math.abs(u))*thick*0.35:(1-u2)*thick*0.3;
      const a=Math.abs(u);
      const groove=a>0.55&&a<0.75?-thick*0.12*Math.sin((a-0.55)/0.2*Math.PI):0;
      return base+groove;
    }
    case 'Double Grooved Knife High':case 'Double Grooved Knife Low':{
      const base=(1-Math.abs(u))*thick*(profile.includes('High')?0.45:0.3);
      const a=Math.abs(u);
      const g1=a>0.3&&a<0.5?-thick*0.1*Math.sin((a-0.3)/0.2*Math.PI):0;
      const g2=a>0.6&&a<0.8?-thick*0.1*Math.sin((a-0.6)/0.2*Math.PI):0;
      return base+g1+g2;
    }
    case 'Faceted':{
      // Multi-faceted: create angular facets
      const a=Math.abs(u);
      if(a<0.33)return thick*0.35;
      if(a<0.66)return thick*0.35-(a-0.33)/0.33*thick*0.15;
      return thick*0.2-(a-0.66)/0.34*thick*0.2;
    }
    case 'Stepped Edges':{
      const a=Math.abs(u);
      if(a<0.4)return thick*0.2;
      if(a<0.45)return thick*0.2-(a-0.4)/0.05*thick*0.2;
      return 0;
    }
    case 'Signet':
      return u<0?(1-u2)*thick*0.15:Math.max(0,(1-u*1.3))*thick*0.4;
    case 'Barrel':
      return(1-u2)*thick*0.45;
    case 'Pipe Cut':case 'Square':case 'Flat':
    default:
      return 0;
  }
}

// Inner surface offset at normalized position t (positive = radius increases = comfort rounding)
function profInnerOff(profile,t,thick){
  const u=t*2-1;
  const u2=u*u;
  // Smooth edge rounding for ALL profiles — rings always have comfort-fit inner edges
  const a=Math.abs(u);
  // Start rounding at 45% from center, ramp up strongly toward edges
  const edgeR=a>0.45?((a-0.45)/0.55):0;
  const baseComfort=edgeR*edgeR*edgeR*thick*1.6; // cubic ramp for smooth but strong curve
  switch(profile){
    case 'Comfort Fit':case 'Euro Shank':
      return(1-u2)*thick*0.25+baseComfort*1.2;
    case 'Round':case 'Dome':case 'D-Shape':case 'Half Round':case 'Barrel':
      return(1-u2)*thick*0.15+baseComfort;
    default:
      return baseComfort;
  }
}

// Setup mouse/touch interaction for 3D ring rotation
function setupRingInteraction(canvas){
  function onDown(x,y){ringView.isDragging=true;ringView.lastX=x;ringView.lastY=y;canvas.style.cursor='grabbing';ringView._hintShown=true;}
  function onMove(x,y){
    if(!ringView.isDragging)return;
    ringView.azimuth+=(x-ringView.lastX)*0.5;
    ringView.elevation=Math.max(0,Math.min(65,ringView.elevation-(y-ringView.lastY)*0.3));
    ringView.lastX=x;ringView.lastY=y;
    renderRing();
  }
  function onUp(){ringView.isDragging=false;canvas.style.cursor='grab';}
  canvas.addEventListener('mousedown',e=>{e.preventDefault();onDown(e.clientX,e.clientY);});
  window.addEventListener('mousemove',e=>{if(ringView.isDragging){e.preventDefault();onMove(e.clientX,e.clientY);}});
  window.addEventListener('mouseup',onUp);
  canvas.addEventListener('touchstart',e=>{if(e.touches.length===1)onDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  canvas.addEventListener('touchmove',e=>{if(ringView.isDragging&&e.touches.length===1){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
  canvas.addEventListener('touchend',onUp,{passive:true});
}

function renderRing(){
  const container=$('#ringPreview');
  
  // Create or reuse canvas
  let canvas=container.querySelector('canvas');
  if(!canvas){
    container.innerHTML='';
    canvas=document.createElement('canvas');
    canvas.style.maxWidth='100%';
    canvas.style.display='block';
    canvas.style.margin='0 auto';
    canvas.style.cursor='grab';
    container.appendChild(canvas);
    setupRingInteraction(canvas);
    ringView.canvas=canvas;
  }
  
  // Size canvas with devicePixelRatio for crisp rendering
  const dpr=Math.max(2, window.devicePixelRatio||1);
  const dispW=Math.min(container.offsetWidth||400, 480);
  const dispH=380;
  canvas.width=dispW*dpr;
  canvas.height=dispH*dpr;
  canvas.style.width=dispW+'px';
  canvas.style.height=dispH+'px';
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,dispW,dispH);
  
  // Empty state
  if(!state.baseMetal){
    ctx.fillStyle=getThemeVar('--text-muted')||'#999';
    ctx.font='12px "DM Sans",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('Select a base metal to begin',dispW/2,dispH/2);
    updateRingExtras();
    return;
  }
  
  const cx=dispW/2, cy=dispH/2;
  
  // Ring geometry in pixels
  const majorR=Math.min(dispW*0.36, 145);         // ring center radius (larger)
  const ringWPx=state.ringWidth*12;                // face width in px (2mm=24px, 14mm=168px)
  const thick=majorR*0.22;                         // wall thickness in px
  const outerR=majorR+thick/2;
  const innerR=majorR-thick/2;
  
  // Camera — remap elevation so 0° = face-on (ring upright as a circle)
  // and increasing elevation tilts the ring forward for 3D perspective
  const eRad=(ringView.elevation-90)*Math.PI/180;
  const aRad=ringView.azimuth*Math.PI/180;
  
  // Strip layout
  const stripLayout=buildStripLayout();
  const sleeveColor=getColor(state.sleeve||state.baseMetal)||'#888';
  const prof=state.profile||'Flat';
  const isFlat=prof==='Flat';
  
  // Build vertical slices: Flat profiles use strip boundaries directly;
  // non-Flat profiles always subdivide so profile curvature renders smoothly
  const vSlices=[];
  if(isFlat){
    for(const sl of stripLayout) vSlices.push({s:sl.s,e:sl.e,color:sl.color});
  } else {
    const NV=36;
    for(let j=0;j<NV;j++){
      const s=j/NV, e=(j+1)/NV, mid=(s+e)/2;
      let col=getColor(state.baseMetal);
      for(const sl of stripLayout){if(mid>=sl.s&&mid<sl.e){col=sl.color;break;}}
      vSlices.push({s,e,color:col});
    }
  }
  
  // Generate quads (polygons) for painter's algorithm
  const quads=[];
  const NS=128; // segments around ring
  
  for(let i=0;i<NS;i++){
    const t1=(i/NS)*2*Math.PI;
    const t2=((i+1)/NS)*2*Math.PI;
    const tM=(t1+t2)/2;
    const sinT1=Math.sin(t1),cosT1=Math.cos(t1);
    const sinT2=Math.sin(t2),cosT2=Math.cos(t2);
    
    // ── OUTER FACE ── (per vertical slice, profile-shaped)
    for(const sl of vSlices){
      const h1=ringWPx/2-sl.s*ringWPx;
      const h2=ringWPx/2-sl.e*ringWPx;
      // Profile-adjusted outer radius at top and bottom of this slice
      const or1=outerR+profOuterOff(prof,sl.s,thick);
      const or2=outerR+profOuterOff(prof,sl.e,thick);
      const pts=[
        rot3D(or1*sinT1,h1,or1*cosT1,eRad,aRad),
        rot3D(or1*sinT2,h1,or1*cosT2,eRad,aRad),
        rot3D(or2*sinT2,h2,or2*cosT2,eRad,aRad),
        rot3D(or2*sinT1,h2,or2*cosT1,eRad,aRad),
      ];
      // Approximate normal (blend radial out + profile slope)
      const midOff=profOuterOff(prof,(sl.s+sl.e)/2,thick);
      const normR=outerR+midOff;
      const n=rot3D(sinT1*normR/outerR,0,cosT1*normR/outerR,eRad,aRad);
      const ld=n.x*0.25+n.y*0.35+n.z*0.65;
      const br=Math.max(0.32,Math.min(1.15,0.55+ld*0.6));
      const dp=(pts[0].z+pts[1].z+pts[2].z+pts[3].z)/4;
      quads.push({p:pts,c:sl.color,b:br,d:dp,t:'o'});
    }
    
    // ── INNER CONTOUR ── (replaces flat top/bottom edges + inner surface)
    // Generates a smooth curved contour: top edge curve → inner wall → bottom edge curve
    // This creates the comfort-fit rounded inner edges visible in profile cross-sections
    
    const NE=10; // subdivisions per edge curve
    const NIW=12; // subdivisions for inner wall
    const comfortR=thick*0.45; // radius of the edge rounding curve
    const topCol=stripLayout.length>0?stripLayout[0].color:getColor(state.baseMetal);
    const botCol=stripLayout.length>0?stripLayout[stripLayout.length-1].color:getColor(state.baseMetal);
    
    // Edge radii at top and bottom
    const orTop=outerR+profOuterOff(prof,1,thick);
    const orBot=outerR+profOuterOff(prof,0,thick);
    // Inner surface adjustment at the start of the straight wall
    const irMid=innerR; // base inner radius at mid-height
    
    // ── Top edge curve (outer face top → inner surface top) ──
    for(let j=0;j<NE;j++){
      const a1=(j/NE)*Math.PI/2;
      const a2=((j+1)/NE)*Math.PI/2;
      // Curve from (orTop, topH) to (irMid_adjusted, topH - comfortR)
      const r1=orTop-(orTop-irMid)*Math.sin(a1);
      const r2=orTop-(orTop-irMid)*Math.sin(a2);
      const h1=ringWPx/2-comfortR*(1-Math.cos(a1));
      const h2=ringWPx/2-comfortR*(1-Math.cos(a2));
      const ep=[
        rot3D(r1*sinT1,h1,r1*cosT1,eRad,aRad),
        rot3D(r1*sinT2,h1,r1*cosT2,eRad,aRad),
        rot3D(r2*sinT2,h2,r2*cosT2,eRad,aRad),
        rot3D(r2*sinT1,h2,r2*cosT1,eRad,aRad),
      ];
      // Normal blends from upward (top face) to inward (inner surface)
      const nAngle=(a1+a2)/2;
      const en=rot3D(-Math.sin(nAngle)*sinT1,Math.cos(nAngle),-Math.sin(nAngle)*cosT1,eRad,aRad);
      const eLd=en.x*0.2+en.y*0.45+en.z*0.5;
      const eBr=Math.max(0.35,Math.min(1.0,0.5+eLd*0.5));
      const eDp=(ep[0].z+ep[1].z+ep[2].z+ep[3].z)/4;
      quads.push({p:ep,c:topCol,b:eBr,d:eDp,t:'t'});
    }
    
    // ── Inner wall (straight section with comfort-fit curve) ──
    const wallTop=ringWPx/2-comfortR;
    const wallBot=-ringWPx/2+comfortR;
    for(let j=0;j<NIW;j++){
      const t_s=j/NIW, t_e=(j+1)/NIW;
      // Map t to actual height along the straight wall portion
      const ih1=wallTop-(wallTop-wallBot)*t_s;
      const ih2=wallTop-(wallTop-wallBot)*t_e;
      // Map t to full ring position (0-1) for profInnerOff, accounting for the curved portions
      const fullT1=1-(comfortR/ringWPx)-(ih1-wallBot)/(ringWPx);
      const fullT2=1-(comfortR/ringWPx)-(ih2-wallBot)/(ringWPx);
      const ir1=innerR+profInnerOff(prof,1-fullT1,thick)*0.5;
      const ir2=innerR+profInnerOff(prof,1-fullT2,thick)*0.5;
      const iPts=[
        rot3D(ir1*sinT1,ih1,ir1*cosT1,eRad,aRad),
        rot3D(ir1*sinT2,ih1,ir1*cosT2,eRad,aRad),
        rot3D(ir2*sinT2,ih2,ir2*cosT2,eRad,aRad),
        rot3D(ir2*sinT1,ih2,ir2*cosT1,eRad,aRad),
      ];
      const iN=rot3D(-sinT1,0,-cosT1,eRad,aRad);
      const iLd=iN.x*0.2+iN.y*0.35+iN.z*0.5;
      const iBr=Math.max(0.38,Math.min(0.78,0.5+iLd*0.28));
      const iDp=(iPts[0].z+iPts[1].z+iPts[2].z+iPts[3].z)/4;
      quads.push({p:iPts,c:sleeveColor,b:iBr,d:iDp,t:'i'});
    }
    
    // ── Bottom edge curve (inner surface bottom → outer face bottom) ──
    for(let j=0;j<NE;j++){
      const a1=(j/NE)*Math.PI/2;
      const a2=((j+1)/NE)*Math.PI/2;
      // Curve from (irMid_adjusted, botH + comfortR) to (orBot, botH)
      const r1=irMid+(orBot-irMid)*Math.sin(a1);
      const r2=irMid+(orBot-irMid)*Math.sin(a2);
      const h1=-ringWPx/2+comfortR*(1-Math.sin(a1));
      const h2=-ringWPx/2+comfortR*(1-Math.sin(a2));
      const ep=[
        rot3D(r1*sinT1,h1,r1*cosT1,eRad,aRad),
        rot3D(r1*sinT2,h1,r1*cosT2,eRad,aRad),
        rot3D(r2*sinT2,h2,r2*cosT2,eRad,aRad),
        rot3D(r2*sinT1,h2,r2*cosT1,eRad,aRad),
      ];
      const nAngle=(a1+a2)/2;
      const en=rot3D(-Math.cos(nAngle)*sinT1,-Math.sin(nAngle),-Math.cos(nAngle)*cosT1,eRad,aRad);
      const eLd=en.x*0.2+en.y*0.3+en.z*0.4;
      const eBr=Math.max(0.3,Math.min(0.85,0.45+eLd*0.4));
      const eDp=(ep[0].z+ep[1].z+ep[2].z+ep[3].z)/4;
      quads.push({p:ep,c:botCol,b:eBr,d:eDp,t:'b'});
    }
  }
  
  // Sort back-to-front (painter's algorithm)
  quads.sort((a,b)=>a.d-b.d);
  
  // ── Draw shadow ellipse beneath ring ──
  const shadowErad=ringView.elevation*Math.PI/180;
  const shadowRx=outerR+4;
  const shadowRy=Math.max(4,(outerR+4)*Math.sin(shadowErad)*0.25);
  const shadowCy=cy+ringWPx/2*Math.cos(shadowErad)+8;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx,shadowCy,shadowRx,shadowRy,0,0,2*Math.PI);
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  ctx.fillStyle=isDark?'rgba(0,0,0,0.35)':'rgba(0,0,0,0.1)';
  ctx.filter='blur(6px)';
  ctx.fill();
  ctx.restore();
  
  // ── Draw all quads ──
  for(const q of quads){
    ctx.beginPath();
    ctx.moveTo(cx+q.p[0].x, cy-q.p[0].y);
    for(let j=1;j<q.p.length;j++) ctx.lineTo(cx+q.p[j].x, cy-q.p[j].y);
    ctx.closePath();
    const fc=adjBright(q.c,q.b);
    ctx.fillStyle=fc;
    ctx.fill();
    // Stroke every quad with its own fill color to seal sub-pixel gaps
    ctx.strokeStyle=fc;
    ctx.lineWidth=0.5;
    ctx.lineJoin='round';
    ctx.stroke();
  }
  
  // ── Drag hint ──
  if(!ringView._hintShown){
    ctx.save();
    ctx.fillStyle=isDark?'rgba(255,255,255,0.35)':'rgba(0,0,0,0.3)';
    ctx.font='10px "DM Sans",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('↔ Drag to rotate',cx,dispH-8);
    ctx.restore();
  }
  
  updateRingExtras();
}

// Update specs, legend, profile display
function updateRingExtras(){
  const specs=$('#ringSpecs');
  if(specs){
    const parts=[];
    if(state.baseMetal) parts.push(`<span>Metal: <span class="val">${state.baseMetal}</span></span>`);
    parts.push(`<span>Width: <span class="val">${state.ringWidth}mm</span></span>`);
    parts.push(`<span>Profile: <span class="val">${state.profile}</span></span>`);
    if(state.strips.length) parts.push(`<span>Strips: <span class="val">${state.strips.length}</span></span>`);
    specs.innerHTML=parts.join('');
  }
  updateLegend();
  // Profile cross-section image
  const profDisp=$('#profileDisplay');
  const profImg=$('#profileImg');
  const profName=$('#profileName');
  if(profDisp && state.profile && typeof PROFILE_IMAGES!=='undefined' && PROFILE_IMAGES[state.profile]){
    profImg.src='data:image/png;base64,'+PROFILE_IMAGES[state.profile];
    profName.textContent=state.profile;
    profDisp.style.display='block';
  } else if(profDisp){
    profDisp.style.display='none';
  }
  // Show reset button when view has been rotated from default
  const resetWrap=$('#ringResetWrap');
  if(resetWrap){
    const isDefault=(ringView.elevation===0 && ringView.azimuth===90);
    resetWrap.style.display=isDefault?'none':'block';
  }
}

function updateLegend(){
  const legend=$('#stripLegend');
  if(!state.strips.length){legend.innerHTML='';return;}
  let html='';
  for(const s of state.strips){
    html+=`<div class="strip-legend-item"><div class="swatch" style="background:${getColor(s.material)}"></div>${s.material}</div>`;
  }
  legend.innerHTML=html;
}

// ── RENDER STEPS BAR ──
function renderStepsBar(){
  const bar=$('#stepsBar');
  bar.innerHTML='';
  STEPS.forEach((step,i)=>{
    const div=h('div',{class:'step-dot',style:{position:'relative'}},[
      h('div',{class:'tip'},[step.tip]),
      h('button',{
        class:'dot'+(i===state.step?' active':'')+(i<state.step?' done':''),
        title:step.label+': '+step.tip,
        onClick:()=>{if(i<=state.step)goToStep(i);}
      },[i<state.step?'✓':String(step.num)]),
      h('div',{class:'step-label'},[step.label]),
    ]);
    if(i<STEPS.length-1){
      div.appendChild(h('div',{class:'line'+(i<state.step?' done':'')}));
    }
    bar.appendChild(div);
  });
}

function goToStep(idx){
  // Skip Band Composer (index 3) if user chose no inlays
  if(idx===3 && !state.wantsInlays){
    idx=state.step<3?4:2;
  }
  // Auto-close ring with base metal edge when leaving compose step forward
  if(state.step===3 && idx>3 && state.strips.length>0){
    const usedWidth=state.strips.reduce((s,st)=>s+st.width,0);
    const remaining=state.ringWidth-usedWidth;
    if(remaining>0.01){
      state.strips.push({material:state.baseMetal,width:parseFloat(remaining.toFixed(2))});
      consolidateStrips();
    }
  }
  state.step=idx;
  renderStepsBar();
  renderPanel();
  renderRing();
  updatePrice();
}
